<!DOCTYPE html>
<style>
    body {
        width: 100%;
        height: 100%;
        margin: 0px;
        padding: 0px;
        overflow: hidden;
        user-select: none;
        font-family: 'Times New Roman', Times, serif;
        -webkit-user-select: none;
        -webkit-touch-callout: none;
        text-align: left;
    }
    #container {
        display: flex;
        margin-left: 20px;
        flex-direction: column; 
        justify-content: center;    
        font-size: 2em;
    }
    #inputField {
        display: inline-block;
        margin-bottom: 30px;
    }
    button {
        font-family: 'Times New Roman', Times, serif;
        color: black;
        outline: 1px solid black;
        appearance: auto;
        -webkit-appearance: none;
    }
    #home {
        position: absolute;
        right: 10px;
        bottom: 10px;
    }
</style>

<body>
    <div id = "container">
        <h2>Settings</h2>
        <div id = "inputField">
            <label for="figure">Select Figure:</label>
            <select name="figure" id="figure" style='font-size: 1em;'>
                <option value="1">Figure 1</option>
                <option value="2">Figure 2</option>
                <option value="3">Figure 3</option>
            </select>
        </div>
        <div id = "inputField">
            <label for="timerLength">Timer Length (Minutes):</label>
            <input id="timerLength" type="number" autocomplete="off" style='font-size: 1em; max-width: 200px;'/>
        </div>
        <div id = "inputField">
            <label for="grid">Gird Lines:</label>
            <select name="grid" id="grid" style='font-size: 1em;'>
                <option value="true">On</option>
                <option value="false">Off</option>
            </select>
        </div>
        <div id = "inputField">
            <label for="timerLength">Max Brush Size (px):</label>
            <input id="timerLength" type="number" autocomplete="off" style='font-size: 1em; max-width: 200px;'/>
        </div>
        <div id = "inputField">
            <label for="timerLength">Min Brush Size (px):</label>
            <input id="timerLength" type="number" autocomplete="off" style='font-size: 1em; max-width: 200px;'/>
        </div>
        <div id = "inputField">
            <label for="timerLength">Default Brush Size (0-100%):</label>
            <input id="timerLength" type="number" autocomplete="off" style='font-size: 1em; max-width: 200px;'/>
        </div>
        <button id="changePasscode" style='font-size: 1em; width: fit-content;' onclick="">Change Passcode</button>
    </div>
    <button id="home" style='font-size: 2em;' onclick="location.href = 'index.html';">Return To Homepage</button>
</body>

<script>
    document.getElementById("timerSubmit").onclick = () => {
        alert(document.getElementById("timerLength").value)
    };
    document.getElementById("figureSubmit").onclick = () => {
        alert(document.getElementById("figure").value)
    };
    document.getElementById("gridSubmit").onclick = () => {
        alert(document.getElementById("figure").value)
    };
</script>
