<!DOCTYPE html>
<html>
<head>
<title>DPAA Testing Software</title>
</head>

<canvas id="gridCanvas" width="0" height="0"></canvas>    
<canvas id="drawCanvas" width="0" height="0"></canvas>    
<canvas id="figureCanvas" width="0" height="0"></canvas>    
<canvas id="uiCanvas" width="0" height="0"></canvas>
<style>
    body {
        width: 100%;
        height: 100%;
        margin: 0px;
        padding: 0px;
        overflow: hidden;
        display: block;
        user-select: none;
        -webkit-user-select: none;
        -webkit-touch-callout: none;
    }
    canvas {
        position: absolute;
    }
</style>

<!-- Colors: FFFFFF, 4F3564, 000000 -->
<!-- Font Awesome by Dave Gandy - http://fontawesome.io  -->
<link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/font-awesome/4.5.0/css/font-awesome.min.css">

<script src="buttons.js"></script>
<script src="math.js"></script>
<script src="animations.js"></script>


<script>
//Constant Declarations----------------------------------------------------------------------------
const VER = "2.2.1";

const PI = Math.PI;
const TAU = 2*Math.PI;
const ROOT_PI = Math.sqrt(Math.PI);

const UI_WIDTH = 100;

const W = window.innerWidth-UI_WIDTH;
const H = window.innerHeight;

const UI_CENTER = UI_WIDTH/2+W;

const GRID_SIZE = W/6;
const ZOOM_SENS = 0.002;
const MAX_ZOOM = 17;
const THETA_RESOLUTION = 0.01;

const MAX_BRUSH_SIZE = 45;
const MIN_BRUSH_SIZE = 10;
const UI_BRUSH_RAD = 21;
const BRUSH_DELTA = (MAX_BRUSH_SIZE-MIN_BRUSH_SIZE)/6;
const DRAW_COLOR = "#4F3564";
const ERASE_COLOR = "#FFFFFF";

const SLIDER_Y1 = 110;
const SLIDER_Y2 = 280;

const COMP_TESTING = false;


//Canvas Setup and Styling-------------------------------------------------------------------------
var gridCanvas = document.getElementById('gridCanvas')
var gridCtx = gridCanvas.getContext("2d", { willReadFrequently: false, aplha: false });

var drawCanvas = document.getElementById('drawCanvas')
var drawCtx = drawCanvas.getContext("2d", { willReadFrequently: true, aplha: false });

var figureCanvas = document.getElementById('figureCanvas')
var figureCtx = figureCanvas.getContext("2d", { willReadFrequently: true, aplha: false });

var uiCanvas = document.getElementById('uiCanvas')
var uiCtx = uiCanvas.getContext("2d", { willReadFrequently: false, aplha: false });

gridCanvas.width = W; gridCanvas.height = H;
drawCanvas.width = W; drawCanvas.height = H;
figureCanvas.width = W; figureCanvas.height = H;

uiCanvas.width = W+UI_WIDTH;
uiCanvas.height = H;

gridCtx.strokeStyle = "black";

drawCtx.lineCap = "round";
drawCtx.lineJoin = "round";

figureCtx.strokeStyle = "black";

uiCtx.textAlign = "center";
uiCtx.textBaseline = "middle";
uiCtx.lineCap = "round";


//Variable Declarations----------------------------------------------------------------------------
var oldGridSize = GRID_SIZE;

var offsetX = W/2;
var offsetY = H/2;
var zoomX = 0;
var zoomY = 0;
var zoom = 1;
var lastZoomed = false;

var zoomGestureDist;
var panX;
var panY;
var dynamicGridSize;

var brushSize = (MAX_BRUSH_SIZE-MIN_BRUSH_SIZE)/2+MIN_BRUSH_SIZE;
var currentStroke;
var lastStrokeX;
var lastStrokeY;
var brushColor = DRAW_COLOR;

var maxTimeSeconds = 5*60;
var timerSeconds = maxTimeSeconds;
var endTestPrompted = false;

var strokes = [];
function PenStroke (xStart, yStart, strokeColor) {
    this.x = [(xStart-offsetX)/zoom];
    this.y = [(yStart-offsetY)/zoom];
    this.brushSize = brushSize/zoom;
    this.strokeColor = strokeColor;
    lastStrokeX = xStart;
    lastStrokeY = yStart;
}
function extendCurrentStroke (rawX, rawY) {
    currentStroke.x.push((rawX-offsetX)/zoom);
    currentStroke.y.push((rawY-offsetY)/zoom);
    lastStrokeX = rawX;
    lastStrokeY = rawY;
}

var buttons = [];
var brushPlus = new Button(15+W, 10, 70, 70, () => {brushSize = Math.min(brushSize+BRUSH_DELTA, MAX_BRUSH_SIZE)}, '\uF067', 2, false, false);
var brushMinus = new Button(15+W, 310, 70, 70, () => {brushSize = Math.max(brushSize-BRUSH_DELTA, MIN_BRUSH_SIZE)}, '\uF068', 3, false, false);
var pencil = new Button(15+W, H-250, 70, 70, () => {brushColor = DRAW_COLOR}, '\uF040', 0, true, false);
var eraser = new Button(15+W, pencil.y+70, 70, 70, () => {brushColor = ERASE_COLOR}, '\uF12d', 0, true, false);
var resetZoom = new Button(15+W, H-80, 70, 70, zoomOut, '\uF066', 0, false, false);
var yesEndTest = new Button((W+UI_WIDTH)/2-105, H/2-115, 70, 70, endTest, '\uF00C', 0, false, true);
var noEndTest = new Button((W+UI_WIDTH)/2+35, H/2-115, 70, 70, () => {endTestPrompted = false; uiRedraw(); lastZoomed = true;}, '\uF00D', 0, false, true);

//TouchStart Listener------------------------------------------------------------------------------
document.addEventListener("touchstart", e => {
    touches = e.touches;
    touch = touches[0];
    let touchX = touch.pageX; 
    let touchY = touch.pageY;
    if (COMP_TESTING) {touch.touchType = "stylus";}

    if (endTestPrompted) { //End Test Promt is Active
        handleButtonTouch(yesEndTest, touch);
        handleButtonTouch(noEndTest, touch);
        uiRedraw();
        return;
    }
    if (touchX <= 80 && touchY >= H-80) { //Check for EndTest Button
        endTestPrompt();
        return;
    }
    if (touchX > W) { //Touch is on UI Bar
        handleSliderTouch(touch);
        buttons.forEach(button => {
            handleButtonTouch(button, touch)
        });
        uiRedraw();
        return;
    }
    if (touch.touchType == "stylus") { //Stylus
        currentStroke = new PenStroke(touch.pageX, touch.pageY, brushColor);
        strokes.push(currentStroke);

        drawCtx.fillStyle = brushColor;
        drawCtx.strokeStyle = brushColor;
        if (brushColor == ERASE_COLOR) {
            drawCtx.globalCompositeOperation = "destination-out";
            gridCtx.lineWidth = 1.5;
            circle(touchX, touchY, brushSize, false, gridCtx);
        } else {
            drawCtx.globalCompositeOperation = "source-over";
        }

        circle(touch.pageX, touch.pageY, brushSize, true, drawCtx);
    } 
    else if (touches.length <= 1) { //Single Finger Pan
        panX = touch.pageX;
        panY = touch.pageY;
    } 
    else { //Multi finger zoom
        zoomGestureDist = Math.hypot(touches[0].pageX - touches[1].pageX, touches[0].pageY - touches[1].pageY);
        zoomX = (touches[0].pageX + touches[1].pageX)/2;
        zoomY = (touches[0].pageY + touches[1].pageY)/2;
    }
})

//TouchMove Listener-------------------------------------------------------------------------------
document.addEventListener("touchmove", e => {
    let touches = e.touches;
    let touch = touches[0];
    let touchX = touch.pageX; 
    let touchY = touch.pageY;
    if (COMP_TESTING) {touch.touchType = "stylus";}

    if (endTestPrompted) { //End Test Promt is Active
        return;
    }
    if (touch.pageX > W) { //Touch is on UI Bar
        handleSliderTouch(touch);
        return;
    }
    if (touch.touchType == "stylus" && currentStroke != undefined) { //Stylus
        gridCtxRedraw();
        
        line(lastStrokeX, lastStrokeY, touchX, touchY, brushSize*2, drawCtx);
        extendCurrentStroke(touchX, touchY);
        
        if (brushColor == ERASE_COLOR) {
            gridCtx.lineWidth = 1.5;
            circle(touchX, touchY, brushSize, false, gridCtx);
        }
        return;
    }
    if (touches.length <= 1) { //Single Finger Pan
        if (lastZoomed) {
            panX = touchX;
            panY = touchY;
            lastZoomed = false
        }

        offsetX += touchX-panX;
        offsetY += touchY-panY;

        panX = touchX;
        panY = touchY;

        mainRedraw();
    } 
    else if (touches.length > 1) { //Multi finger zoom
        let newZoomDistance = Math.hypot(touches[0].pageX-touches[1].pageX, touches[0].pageY-touches[1].pageY);
        zoom = clamp(zoom - (zoomGestureDist-newZoomDistance)*ZOOM_SENS*Math.abs(zoom), 1, MAX_ZOOM);
        zoomGestureDist = newZoomDistance;

        lastZoomed = true;
        mainRedraw();
    }
})

//TouchEnd Listener--------------------------------------------------------------------------------
document.addEventListener("touchend", e => { //Clear the Eraser Outline
    gridCtxRedraw();
});

//Wheel Listener-----------------------------------------------------------------------------------
document.addEventListener("wheel", e => { //TODO: REMOVE
    zoom = clamp(zoom-e.deltaY*ZOOM_SENS*Math.abs(zoom)/2, 1, MAX_ZOOM);

    zoomX = e.pageX;
    zoomY = e.pageY;
    mainRedraw();
});


//Drawing the content of the main canvas-----------------------------------------------------------
function mainRedraw() {
    //Calculate screen offsets for zooming and panning
    dynamicGridSize = GRID_SIZE*zoom;
    let gridDelta = dynamicGridSize - oldGridSize;
    offsetX -= gridDelta*(zoomX-offsetX)/oldGridSize;
    offsetY -= gridDelta*(zoomY-offsetY)/oldGridSize;
    oldGridSize = dynamicGridSize;

    offsetX = clamp(offsetX, -W/1.5*zoom+W, W/1.5*zoom);
    offsetY = clamp(offsetY, -H/1.5*zoom+H, H/1.5*zoom);

    //Call each canvas' redraw functions
    gridCtxRedraw();
    drawCtxRedraw();
    figureCtxRedraw();
}    
mainRedraw();

//Drawing the content of the grid canvas-----------------------------------------------------------
function gridCtxRedraw() {
    gridCtx.clearRect(0, 0, W, H);

    //Drawing only the gridlines that are visible on screen
    let subGridSize = dynamicGridSize/4;
    xStart = -offsetX/dynamicGridSize;
    yStart = -offsetY/dynamicGridSize;

    let i = 0;
    for (var x = Math.floor(xStart)*dynamicGridSize; x < W+Math.ceil(xStart)*dynamicGridSize; x += subGridSize) {
        if (i%4 == 0) {
            gridCtx.lineWidth = 1;
        } else {
            gridCtx.lineWidth = 0.5;
        }
        gridCtx.beginPath();
        gridCtx.moveTo(x+offsetX, 0);
        gridCtx.lineTo(x+offsetX, H);
        gridCtx.stroke();
        i++;
    }
    i = 0;
    for (var y = Math.floor(yStart)*dynamicGridSize; y < H+Math.ceil(yStart)*dynamicGridSize; y += subGridSize) {
        if (i%4 == 0) {
            gridCtx.lineWidth = 1;
        } else {
            gridCtx.lineWidth = 0.5;
        }
        gridCtx.beginPath();
        gridCtx.moveTo(0, y+offsetY);
        gridCtx.lineTo(W, y+offsetY);
        gridCtx.stroke();
        i++;
    }
}

//Drawing the content of the draw canvas-----------------------------------------------------------
function drawCtxRedraw() {
    drawCtx.clearRect(0, 0, W, H);

    //Drawing strokes using one continuous line
    strokes.forEach(stroke => {
        if (stroke.strokeColor == DRAW_COLOR) {
            drawCtx.globalCompositeOperation = "source-over";
        } else {
            drawCtx.globalCompositeOperation = "destination-out";
        }
        drawCtx.strokeStyle = stroke.strokeColor;
        drawCtx.lineWidth = stroke.brushSize*zoom*2;
        drawCtx.beginPath();
        drawCtx.moveTo(stroke.x[0]*zoom+offsetX, stroke.y[0]*zoom+offsetY)
        for (let i = 0; i < stroke.x.length; i++) {
            drawCtx.lineTo(stroke.x[i]*zoom+offsetX, stroke.y[i]*zoom+offsetY);
        }
        drawCtx.stroke();
    });
}

//Drawing the content of the figure canvas---------------------------------------------------------
function figureCtxRedraw () {
    figureCtx.clearRect(0, 0, W, H);
    figureCtx.lineWidth = 2;

    //Drawing figure outline
    figureCtx.beginPath();
    figureCtx.moveTo(offsetX+calcRad(0)*zoom, offsetY);
    for (let theta = THETA_RESOLUTION; theta < TAU; theta += THETA_RESOLUTION) {
        let r = calcRad(theta);
        figureCtx.lineTo(offsetX+r*Math.cos(theta)*zoom, offsetY-r*Math.sin(theta)*zoom);
    }
    figureCtx.lineTo(offsetX+calcRad(0)*zoom, offsetY);
    figureCtx.stroke();

    line(W, 0, W, H, 5, figureCtx);
}


//Drawing the content of the UI canvas-------------------------------------------------------------
function uiRedraw () {
    //Clear the canvas every redraw
    uiCtx.clearRect(0, 0, W+UI_WIDTH, H);

    // Draw Timer
    uiCtx.fillStyle = "white";
    uiCtx.strokeStyle = "black";
    uiCtx.lineWidth = 2;
    uiCtx.beginPath();
    uiCtx.roundRect(W/2-85, -2, 170, 57, [0, 0, 10, 10]);
    uiCtx.fill();
    uiCtx.stroke();

    let mins = "" + Math.floor(timerSeconds/60);
    if (mins.length <= 1) {
        mins = "0"+mins;
    }
    let secs = "" + timerSeconds%60;
    if (secs.length <= 1) {
        secs = "0"+secs;
    }
    uiCtx.fillStyle = "black";
    uiCtx.font = "normal 500 60px Times New Roman";
    uiCtx.fillText(mins+":"+secs, W/2, 27);

    //Draw brush size slider
    let sliderHeight = SLIDER_Y2-(brushSize-MIN_BRUSH_SIZE)/(MAX_BRUSH_SIZE-MIN_BRUSH_SIZE)*(SLIDER_Y2-SLIDER_Y1);

    line(UI_CENTER, SLIDER_Y1, UI_CENTER, SLIDER_Y2, 10, uiCtx)
    uiCtx.strokeStyle = "#d6d6d6";
    line(UI_CENTER, SLIDER_Y1, UI_CENTER, SLIDER_Y2, 6, uiCtx)
    uiCtx.strokeStyle = "#a1a1a1";
    line(UI_CENTER, sliderHeight, UI_CENTER, SLIDER_Y2, 6, uiCtx)

    //Draw current brush size
    uiCtx.strokeStyle = "black";
    uiCtx.lineWidth = 2;
    if (brushColor == ERASE_COLOR) {
        uiCtx.fillStyle = "#f2f2f2";
    } else {
        uiCtx.fillStyle = DRAW_COLOR;
    }
    circle(UI_CENTER, sliderHeight, brushSize/MAX_BRUSH_SIZE*UI_BRUSH_RAD+4, true, uiCtx);
    uiCtx.stroke();

    //Draw icon buttons
    uiCtx.lineWidth = 1.5;
    uiCtx.fillStyle = "#4F3564";
    let recurse = false;
    buttons.forEach(button => {
        drawIconButton(button, uiCtx);
        if (button.trans-- > 0) {
            recurse = true;
        }
    });
    if (recurse) {
        requestAnimationFrame(uiRedraw);
    }

    //Draw end test button
    uiCtx.fillStyle = "#f2f2f2";
    uiCtx.lineWidth = 4;
    uiCtx.beginPath();
    uiCtx.roundRect(10, H-80, 70, 70, [10]);
    uiCtx.stroke();
    uiCtx.fill();

    uiCtx.font = 'normal 500 30px Times New Roman';
    uiCtx.fillStyle = "#6b0000";
    uiCtx.fillText("End", 45, H-59.5);
    uiCtx.fillText("Test", 45, H-29.5);

    //Draw Eraser/Pencil Toggle
    uiCtx.fillStyle = 'rgba(0,0,0,0.1)';
    uiCtx.beginPath();
    uiCtx.roundRect(pencil.x, pencil.y, pencil.w, pencil.h, [10, 10, 0, 0]);
    if (brushColor == DRAW_COLOR) {
        uiCtx.lineWidth = 3;
    } else {
        uiCtx.lineWidth = 1.5;
        uiCtx.fill();
    }
    uiCtx.stroke();

    uiCtx.beginPath();
    uiCtx.roundRect(eraser.x, eraser.y, eraser.w, eraser.h, [0, 0, 10, 10]);
    if (brushColor == ERASE_COLOR) {
        uiCtx.lineWidth = 3;
    } else {
        uiCtx.fill();
        uiCtx.lineWidth = 1.5;
    }
    uiCtx.stroke();
    
}
uiRedraw(); //Call uiRedraw to start loading the used fonts
function load () { 
    if (document.fonts.check('1px FontAwesome')) {
        uiRedraw(); //Call uiRedraw once fonts are loaded to display everything correctly
    } else {
        setTimeout(load, 20); //Recursively check every 20ms until font loads
    }
}
load(); //Begin loading loop

function endTestPrompt() {
    endTestPrompted = true;

    uiCtx.fillStyle = 'rgba(0,0,0,0.3)';
    uiCtx.fillRect(0, 0, W+UI_WIDTH, H);

    uiCtx.fillStyle = 'white';
    uiCtx.strokeStyle = 'black';
    uiCtx.lineWidth = 3;
    uiCtx.beginPath();
    uiCtx.roundRect((W+UI_WIDTH)/2-220, H/2-190, 440, 170, [10]);
    uiCtx.fill();
    uiCtx.stroke();

    uiCtx.font = 'normal 500 30px Times New Roman';
    uiCtx.fillStyle = "black";
    uiCtx.fillText("End Test Before Timer Expires?", (W+UI_WIDTH)/2, H/2-150);

    uiCtx.lineWidth = 2;
    uiCtx.fillStyle = "Green";
    drawIconButton(yesEndTest, uiCtx);
    uiCtx.fillStyle = "#6b0000";
    drawIconButton(noEndTest, uiCtx);
}

function endTest() {
    clearInterval(timerInterval);

    location.href = "index.html";
}

//Helper Functions---------------------------------------------------------------------------------
function zoomOut() {
    offsetX = W/2;
    offsetY = H/2;
    zoomX = W/2;
    zoomY = H/2;
    zoom = 1;
    oldGridSize = GRID_SIZE;
    mainRedraw();

    animInc = 0;
    zoomOutAnimation();
}

function decrementTimer() {
    if (endTestPrompted) {
        return;
    }
    if (timerSeconds > 0) {
        timerSeconds--;
        uiRedraw();
    } else {
        endTest();
    }
}
var timerInterval = setInterval(decrementTimer, 1000);

//Easy Circle Drawing----------------------------------------------------------
function circle(x, y, r, fill, ctx) {
    ctx.beginPath();
    ctx.arc(x, y, r, 0, TAU, false);
    if (fill) {
        ctx.fill();
    } else {
        ctx.stroke();
    }
}

//Easy Line Drawing------------------------------------------------------------
function line(x, y, x2, y2, width, ctx) {
    ctx.lineWidth = width;
    ctx.beginPath();
    ctx.moveTo(x, y);
    ctx.lineTo(x2, y2);
    ctx.stroke();
}
</script>
</html>
