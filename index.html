<!DOCTYPE html>
<head><title>DPAA Testing Software</title></head>

<!-- Font Awesome by Dave Gandy - http://fontawesome.io  -->
<link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/font-awesome/4.5.0/css/font-awesome.min.css">
<style>
body {
    width: 100%;
    height: 100%;
    margin: 0px;
    padding: 0px;
    overflow: hidden;
    display: block;
    user-select: none;
    -webkit-user-select: none;
    -webkit-touch-callout: none;
    font-family: 'Times New Roman', Times, serif;
}
p {
    position: absolute;
    margin-top: 0px;
    margin-bottom: 0px;
    font-size: 2em;
}

#main {
    display: flex;
    flex-direction: column; 
    justify-content: center;    
    font-size: 2em;    
    padding: 0px 0px;
    text-align: center;
}
#vers {
    left: 10px;
    top: 10px;
}
#copyright {
    left: 10px;
    bottom: 10px;
}
#title {
    margin-top: 14%;
    font-weight: 200;
    margin-bottom: 0px;
}

button {
    color: black;
    background-color: white;
    outline: 2px solid black;
    border-radius: 10px;
    appearance: auto;
    -webkit-appearance: none;
    box-sizing: border-box;
    -webkit-box-sizing: border-box;
    border: none;
}
.navButton {
    font-family: 'Times New Roman', Times, serif;
    font-size: 60px;
    padding: 5px;
    margin-top: 24px;
    margin-bottom: 0px;
    width: 315px;
    margin-left: auto;
    margin-right: auto;
}
.iconButton {
    position: absolute;
    right: 10px;
    bottom: 10px;
    width: 70px;
    height: 70px;
    font-size: 60px;
    /* margin: 0px; */
    padding: 0px;
    
    display: flex;
    justify-content: center;
    align-items: center;
}

<body>
<p id="vers"></p>
<p id="copyright"></p>

<div id="main">
    <h1 id="title">Area Filling <br> Accuracy Evaluator</h1>
    <button class="navButton" onclick="location.href = 'test.html'">Practice</button>
    <button class="navButton" onclick="location.href = 'testBegin_auth.html'"><mark>Initiate Test</mark></button>
</div>

<button class="iconButton" onclick="location.href = 'settings_auth.html'"><i class="fa fa-cog"></i></button>
<!-- <button class="iconButton" onclick="location.href = 'settings_auth.html'"></button> -->
</body>


<script src="gen-config.js"></script>
<script>
//Constant Declarations----------------------------------------------------------------------------
const VER = "6.0.0";
const YEAR = new Date().getFullYear();

document.getElementById("vers").textContent = VER;
document.getElementById("copyright").textContent = "© " + YEAR + " McPhail Patents and Research LLC";

//Initialize Settings------------------------------------------------------------------------------
sessionStorage.isTest = JSON.stringify("false");

//For each settings option, initialize it to the default value if it is undefined
for (const [key, value] of Object.entries(defaultSettings)) {
    if (localStorage[key] == undefined) {
        localStorage[key] = JSON.stringify(defaultSettings[key]);
    }
};
</script>
