<!DOCTYPE html>
<html>
<head>
<title>TinyTanks.us</title>
<link rel="shortcut icon" href="https://raw.githubusercontent.com/CrazyMeowCows/TankSimulator/main/favicon.ico">
</head>

<body>
<canvas id="canvas" width="0" height="0"></canvas>    
<style>
    body {
    width: 100%;
    height: 100%;
    margin: 0px;
    padding: 0px;
    overflow: hidden;
    display: block;
    user-select: none;
    -webkit-user-select: none;
    -webkit-touch-callout: none;
    }
</style>
</body>
<script src="https://code.jquery.com/jquery-2.1.0.js"></script>
    
<script>   
//Canvas Setup and sizing
var canvas = document.getElementById('canvas'),
ctx = canvas.getContext("2d", { willReadFrequently: true, aplha: false });
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;
    
const W = canvas.width;
const H = canvas.height;
const GRID_SIZE = W/10;
const ZOOM_SENS = 0.002
const PI = Math.PI;
const VER = "1.8.1";

var offsetX = W/2;
var offsetY = H/2;
var zoom = 1;
var zoomX = 0;
var zoomY = 0;

var panX = 0;
var panY = 0;
var zoomD = 0;
var lastZoomed = false;

document.addEventListener("touchmove", e => {
    touches = e.touches;
    if (touches[0].touchType == "stylus") { //Stylus --------------------------
        circle(touches[0].pageX, touches[0].pageY, 10, "red");

    } else if (touches.length <= 1) { //Single Finger Pan ---------------------
        touch = touches[0];

        if (lastZoomed) {
            panX = touch.pageX;
            panY = touch.pageY;
            lastZoomed = false
        }

        newX = touch.pageX;
        newY = touch.pageY;

        offsetX += (newX - panX);
        offsetY += (newY - panY);

        panX = newX;
        panY = newY;

        redraw()
    } else { //Multi finger zoom ----------------------------------------------
        newZoomD = Math.hypot(touches[0].pageX-touches[1].pageX, touches[0].pageY-touches[1].pageY)

        zoom = Math.max(zoom-(zoomD - newZoomD)*ZOOM_SENS*Math.abs(zoom), 1)
        zoomX = (touches[0].pageX + touches[1].pageX)/2
        zoomY = (touches[0].pageY + touches[1].pageY)/2

        zoomD = newZoomD
        lastZoomed = true;

        redraw()
    }
})
document.addEventListener("touchstart", e => {
    touches = e.touches;
    if (touches[0].touchType == "stylus") { //Stylus --------------------------
        circle(touches[0].pageX, touches[0].pageY, 10, "red");

    } else if (touches.length <= 1) { //Single Finger Pan ---------------------
        touch = touches[0];
        panX = touch.pageX;
        panY = touch.pageY;

    } else { //Multi finger zoom ----------------------------------------------
        zoomD = Math.hypot(touches[0].pageX - touches[1].pageX, touches[0].pageY - touches[1].pageY)
    }
})
document.addEventListener("wheel", e => { //TESTING --------------------------- //TODO: REMOVE
    zoom = Math.max(zoom-e.deltaY*ZOOM_SENS/2, 1)
    zoomX = e.pageX;
    zoomY = e.pageY;
    redraw();
})

var oldDelta = GRID_SIZE;
var delta = null;
function redraw() {
    ctx.clearRect(0, 0, W, H);
    ctx.fillText(VER, 10, 20)

    delta = GRID_SIZE*zoom;
    delta_delta = delta - oldDelta
    offsetX -= delta_delta*(zoomX-offsetX)/delta;
    offsetY -= delta_delta*(zoomY-offsetY)/delta;
    oldDelta = delta;

    ctx.lineWidth = 1;
    ctx.beginPath();
    for (var x = Math.floor(-offsetX/delta)*delta; x < W+Math.ceil(-offsetX/delta)*delta; x += delta) {
        ctx.moveTo(x+offsetX, 0);
        ctx.lineTo(x+offsetX, H);
    }
    for (var y = Math.floor(-offsetY/delta)*delta; y < H+Math.ceil(-offsetY/delta)*delta; y += delta) {
        ctx.moveTo(0, y+offsetY);
        ctx.lineTo(W, y+offsetY);
    }
    ctx.stroke();

    ctx.lineWidth = 0.5;
    ctx.beginPath();
    for (var x = Math.floor(-offsetX/delta)*delta; x < W+Math.ceil(-offsetX/delta)*delta; x += delta/5) {
        ctx.moveTo(x+offsetX, 0);
        ctx.lineTo(x+offsetX, H);
    }
    for (var y = Math.floor(-offsetY/delta)*delta; y < H+Math.ceil(-offsetY/delta)*delta; y += delta/5) {
        ctx.moveTo(0, y+offsetY);
        ctx.lineTo(W, y+offsetY);
    }
    ctx.stroke();

    circle(offsetX+400*zoom, offsetY+400*zoom, 10, "blue");
    circle(offsetX+0*zoom, offsetY+0*zoom, 10, "blue");
}
redraw()
    
//Easy Circle Drawing
function circle(x, y, r, color) {
    ctx.fillStyle = color;
    ctx.beginPath();
    ctx.arc(x, y, r, 0, PI*2, false);
    ctx.fill();
}

//Easy Line Drawing
function line(x, y, x2, y2, color, width) {
    ctx.strokeStyle = color;
    ctx.lineWidth = width;
    ctx.beginPath();
    ctx.moveTo(x, y);
    ctx.lineTo(x2, y2);
    ctx.stroke();
}
    
</script>
</html>
