<!DOCTYPE html>
<html>
<head>
<title>DPAA Testing Software</title>
</head>

<canvas id="canvas" width="0" height="0"></canvas>    
<style>
    body {
        width: 100%;
        height: 100%;
        margin: 0px;
        padding: 0px;
        overflow: hidden;
        display: block;
        user-select: none;
        -webkit-user-select: none;
        -webkit-touch-callout: none;
    }
    canvas {
        position: absolute;
    }
</style>
<link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/font-awesome/4.5.0/css/font-awesome.min.css">
<!-- Font Awesome by Dave Gandy - http://fontawesome.io  -->
<!-- Colors: FFFFFF, 4F3564, 000000 -->

<script>
//Constant Declarations----------------------------------------------------------------------------
const VER = "2.2.1";

const W = window.innerWidth;
const H = window.innerHeight;


//Canvas Setup and Styling-------------------------------------------------------------------------
var canvas = document.getElementById('canvas')
var ctx = canvas.getContext("2d", { willReadFrequently: false, aplha: false });

canvas.width = W;
canvas.height = H;

ctx.textAlign = "center";
ctx.textBaseline = "middle";

var buttons = [];
function Button (x, y, width, height, event, icon, iconVoffset, hideOutline, dontPush) {
    this.x = x;
    this.y = y;
    this.w = width;
    this.h = height;
    this.event = event;
    this.icon = icon;
    this.iconVoffset = iconVoffset;
    this.hideOutline = hideOutline;

    this.trans = 0;
    if (!dontPush) {
        buttons.push(this);
    }
}

//TouchStart Listener------------------------------------------------------------------------------
document.addEventListener("touchstart", e => {
    touches = e.touches;
    touch = touches[0];
    let touchX = touch.pageX; 
    let touchY = touch.pageY;

    buttons.forEach(button => {
        if (touchX > button.x && touchX < button.x+button.w > button.y && touchY < button.y+button.h) {
            button.event();
            redraw();
        }
    });
})

//Creating Buttons for canvas--------------------------------------------------------------------
// var brushPlus = new Button(W/2-100, 10, 200, 70, () => {brushSize = Math.min(brushSize+BRUSH_DELTA, MAX_BRUSH_SIZE)}, '\uF067', 2, false, false);
// var brushMinus = new Button(W/2-100, 310, 200, 70, () => {brushSize = Math.max(brushSize-BRUSH_DELTA, MIN_BRUSH_SIZE)}, '\uF068', 3, false, false);
var settings = new Button(W-80, H-80, 70, 70, () => {alert("settings")}, '\uF013', 0, false, false);

function drawIconButton(button) {
    ctx.font = '60px FontAwesome';
    ctx.fillText(button.icon, button.x+button.w/2, button.y+button.h/2+button.iconVoffset);

    if (!button.hideOutline) {
        ctx.beginPath();
        ctx.roundRect(button.x, button.y, button.w, button.h, [10]);
        ctx.stroke();

        let oldColor = ctx.fillStyle;
        ctx.fillStyle = 'rgba(0,0,0,'+button.trans/20+')';
        ctx.beginPath();
        ctx.roundRect(button.x, button.y, button.w, button.h, [10]);
        ctx.fill();
        ctx.fillStyle = oldColor;
    }
}

//Drawing the content of the main canvas-----------------------------------------------------------
function redraw() {
    //Clear the canvas every redraw
    ctx.clearRect(0, 0, W, H);

    ctx.font = '20px Times New Roman';
    ctx.fillStyle = "black";
    ctx.fillText(VER, 30, 20);

    ctx.font = '50px Times New Roman';
    ctx.fillText("DPAA Testing Software", W/2, 80);

    //Draw icon buttons
    ctx.lineWidth = 1.5;
    ctx.fillStyle = "#4F3564";
    buttons.forEach(button => {
        drawIconButton(button);
    });
}    
redraw(); //Call redraw to start loading the used fonts
function load () { 
    if (document.fonts.check('1px FontAwesome')) {
        redraw(); //Call redraw once fonts are loaded to display everything correctly
    } else {
        setTimeout(load, 20); //Recursively check every 20ms until font loads
    }
}
load(); //Begin loading loop
</script>
</html>
