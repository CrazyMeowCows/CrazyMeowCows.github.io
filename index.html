<!DOCTYPE html>
<html>
<head>
<title>TinyTanks.us</title>
<link rel="shortcut icon" href="https://raw.githubusercontent.com/CrazyMeowCows/TankSimulator/main/favicon.ico">
</head>


<body>
<canvas id="canvas" width="0" height="0"></canvas>    
<style>
    body {
    width: 100%;
    height: 100%;
    margin: 0px;
    padding: 0px;
    overflow: hidden;
    display: block;
    }
</style>
</body>
<script src="https://code.jquery.com/jquery-2.1.0.js"></script>
    
<script>   
//Canvas Setup and sizing
var canvas = document.getElementById('canvas'),
ctx = canvas.getContext("2d", { willReadFrequently: true });

canvas.width = window.innerWidth    
canvas.height = window.innerHeight    
    
const w = canvas.width;
const h = canvas.height;
const pi = Math.PI;

//canvas.ontouchmove = (function (event) {
////        mouseX = event.pageX;
////        mouseY = event.pageY;
//    circle(event.pageX, event.pageY, 10, "black")
//});

    
    
document.addEventListener("touchmove", e => {
    circle(e.touches[0].pageX, e.touches[0].pageY, 10, "black")
})
document.addEventListener("touchstart", e => {
    circle(e.touches[0].pageX, e.touches[0].pageY, 10, "black")
})
    
//Easy Circle Drawing
function circle(x, y, r, color) {
    ctx.fillStyle = color;
    ctx.beginPath();
    ctx.arc(x, y, r, 0, pi*2, false);
    ctx.fill();
}

//Easy Line Drawing
function line(x, y, x2, y2, color, width) {
    ctx.strokeStyle = color;
    ctx.lineWidth = width;
    ctx.beginPath();
    ctx.moveTo(x, y);
    ctx.lineTo(x2, y2);
    ctx.stroke();
}
    
</script>
</html>
