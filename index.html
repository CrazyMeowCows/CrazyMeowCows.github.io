<!DOCTYPE html>
<html>
<head>
<title>TinyTanks.us</title>
<link rel="shortcut icon" href="https://raw.githubusercontent.com/CrazyMeowCows/TankSimulator/main/favicon.ico">
</head>


<body>
<canvas id="canvas" width="0" height="0"></canvas>    
<style>
    body {
    width: 100%;
    height: 100%;
    margin: 0px;
    padding: 0px;
    overflow: hidden;
    display: block;
    user-select: none;
    -webkit-user-select: none;
    -webkit-touch-callout: none;
    }
</style>
</body>
<script src="https://code.jquery.com/jquery-2.1.0.js"></script>
    
<script>   
//Canvas Setup and sizing
var canvas = document.getElementById('canvas'),
ctx = canvas.getContext("2d", { willReadFrequently: true });

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;
    
const w = canvas.width;
const h = canvas.height;
const gridSize = w/10
const pi = Math.PI;
const VER = "1.5";

var offsetX = 0;
var offsetY = 0;
var zoom = 1;

var panX = 0;
var panY = 0;
var zoomD = 0;
var lastZoomed = false;

// function inc () {
//     zoom += 0.01
//     redraw()
// }
// setInterval(inc, 20)
    
document.addEventListener("touchmove", e => {
    touches = e.touches;
    if (touches[0].touchType == "stylus") { //Stylus --------------------------
        circle(touches[0].pageX, touches[0].pageY, 10, "red");
    } else if (touches.length <= 1) { //Single Finger Pan ---------------------
        touch = touches[0];
        if (lastZoomed) {
            panX = touch.pageX;
            panY = touch.pageY;
            lastZoomed = false
        }
        newX = touch.pageX;
        newY = touch.pageY;
        offsetX += (newX - panX);
        offsetY += (newY - panY);
        panX = newX;
        panY = newY;
        redraw()
    } else { //Multi finger zoom ----------------------------------------------
        newZoomD = Math.hypot(touches[0].pageX - touches[1].pageX, touches[0].pageY - touches[1].pageY)
        zoom += (newZoomD - zoomD)*0.1
        zoomD = newZoomD
        lastZoomed = true;
        redraw()
    }
})
document.addEventListener("touchstart", e => {
    touches = e.touches;
    if (touches[0].touchType == "stylus") { //Stylus --------------------------
        circle(touches[0].pageX, touches[0].pageY, 10, "red");

    } else if (touches.length <= 1) { //Single Finger Pan ---------------------
        touch = touches[0];
        panX = touch.pageX;
        panY = touch.pageY;

    } else { //Multi finger zoom ----------------------------------------------
        zoomD = Math.hypot(touches[0].pageX - touches[1].pageX, touches[0].pageY - touches[1].pageY)
    }
})

function redraw() {
    ctx.clearRect(0, 0,w, h);
    ctx.fillText(VER, 10, 20)

    let delta = gridSize + gridSize*(zoom%1);

    ctx.lineWidth = 1;
    ctx.beginPath();
    for (var x = 0; x < w; x += delta) {
        ctx.moveTo(x, 0);
        ctx.lineTo(x, h);
    }
    for (var y = 0; y < h; y += delta) {
        ctx.moveTo(0, y);
        ctx.lineTo(w, y);
    }
    ctx.stroke();

    ctx.lineWidth = 0.5;
    ctx.beginPath();
    for (var x = 0; x < w; x += delta/5) {
        ctx.moveTo(x, 0);
        ctx.lineTo(x, h);
    }
    for (var y = 0; y < h; y += delta/5) {
        ctx.moveTo(0, y);
        ctx.lineTo(w, y);
    }
    ctx.stroke();
    // circle(offsetX+w/2, offsetY+h/2, 10, "blue");
}
redraw()
    
//Easy Circle Drawing
function circle(x, y, r, color) {
    ctx.fillStyle = color;
    ctx.beginPath();
    ctx.arc(x, y, r, 0, pi*2, false);
    ctx.fill();
}

//Easy Line Drawing
function line(x, y, x2, y2, color, width) {
    ctx.strokeStyle = color;
    ctx.lineWidth = width;
    ctx.beginPath();
    ctx.moveTo(x, y);
    ctx.lineTo(x2, y2);
    ctx.stroke();
}
    
</script>
</html>
