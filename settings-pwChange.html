<!DOCTYPE html>
<head>
    <link rel="stylesheet" href="settings-stylesheet.css">
</head>

<style>
    p {
        margin-top: 0px;
        margin-bottom: 0px;
    }
</style>

<body>
    <div class="sidenav">
        <a href="settings.html">General</a>
        <a href="settings-practice.html">Practice</a>
        <a href="settings-pwChange.html">Password</a>
    </div>

    <div id = "main">
        <div id = "break"></div>
        <p>Please enter the admin password to set a new proctor password.</p>
        <div id = "break"></div>
        <div id = "break"></div>
        <div id = "inputField">
            <label for="adminPassword">Admin Password:</label>
            <input id="adminPassword" type="password" required autocomplete="off" style='font-size: 1em;'/>
        </div>
        <div id = "inputField">
            <label for="proctorPassword">New Proctor Password:</label>
            <input id="proctorPassword" type="text" required autocomplete="off" style='font-size: 1em;'/>
        </div>
        <button id="submit" style='font-size: 1em; width: fit-content;'>Change Password</button>
    </div>
    <button id="home" style='font-size: 2em;'>Save and Exit</button>
</body>

<script>
    document.getElementById("submit").onclick = () => {
        try {
            if (document.getElementById("adminPassword").value == document.getElementsByName("viewport")[0].id.split("|")[1] && document.getElementById("proctorPassword").value != "") {
                localStorage.newPW = JSON.stringify(document.getElementById("proctorPassword").value);
                document.getElementById("status").textContent = "Proctor password set."
            } else {
                document.getElementById("adminPassword").value = "";
            }
        } catch (error) {
            location.href = 'crash';
        }
    };
</script>
