<!DOCTYPE html>
<style>
    body {
        width: 100%;
        height: 100%;
        margin: 0px;
        padding: 0px;
        overflow: hidden;
        user-select: none;
        font-family: 'Times New Roman', Times, serif;
        -webkit-user-select: none;
        -webkit-touch-callout: none;
        text-align: center;
        display: flex;
        flex-direction: column; 
        justify-content: center;    
        font-size: 2em;
    }
    div {
        margin-top: 50px;
        display: inline-block;
    }
    button {
        font-family: 'Times New Roman', Times, serif;
    }
</style>

<body>
    <h2>Thank you for your participation!</h2>
    <p>Please inform your procter that you have finished your test.</p>
    <div>
        <label for="procterPassword">Procter Passcode:</label>
        <input id="procterPassword" type="password" required autocomplete="off" style='font-size: 1em;'/>
        <button id="submit" style='font-size: 1em;'>Submit</button>
    </div>
    <p id="score"></p>
</body>

<script src="obfuscated.js"></script>
<script>
    document.getElementById("submit").onclick = () => {
        let pw = document.getElementById("procterPassword").value
        if (pw == getPassword()) {
            document.getElementById("score").textContent = "Participant Score: " + JSON.parse(sessionStorage.scoreObject);
        }
    };
</script>
