<!DOCTYPE html>
<style>
    body {
        width: 100%;
        height: 100%;
        margin: 0px;
        padding: 0px;
        overflow: hidden;
        user-select: none;
        font-family: 'Times New Roman', Times, serif;
        -webkit-user-select: none;
        -webkit-touch-callout: none;
        text-align: center;
    }
    #container {
        display: flex;
        flex-direction: column; 
        justify-content: center;    
        font-size: 2em;
    }
    #inputField {
        margin-top: 50px;
        display: inline-block;
    }
    button {
        font-family: 'Times New Roman', Times, serif;
        color: black;
        outline: 1px solid black;
        appearance: auto;
        -webkit-appearance: none;
    }
    #home {
        position: absolute;
        right: 10px;
        bottom: 10px;
    }
</style>

<body>
    <div id = "container">
        <h2>Area Filling Accuracy Evaluation Tool</h2>
        <p>Please enter a procter passcode to begin the test.</p>
        <div id = "inputField">
            <label for="procterPassword">Procter Passcode:</label>
            <input id="procterPassword" type="password" required autocomplete="off" style='font-size: 1em;'/>
            <button id="submit" style='font-size: 1em;'>Submit</button>
        </div>
    </div>
    <button id="home" style='font-size: 2em;' onclick="location.href = 'index.html';">Return To Homepage</button>
</body>

<script src="authenticate.js"></script>

<script>
    document.getElementById("submit").onclick = () => {
        try {
            if (authenticate(document.getElementById("procterPassword").value)) {
                sessionStorage.isTest = JSON.stringify("true"); 
                location.href = 'test.html';
            } else {
                document.getElementById("procterPassword").value = "";
            }
        } catch (error) {
            sessionStorage.isTest = JSON.stringify("false"); 
            location.href = 'crash';
        }
    };
</script>
